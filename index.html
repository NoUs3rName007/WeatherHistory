<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turku Weather History</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <h1>Turku Weather History (1959-2026)</h1>
    </header>

    <section class="controls">
        <div class="control-group">
            <label for="monthSelect">Month</label>
            <select id="monthSelect">
                <option value="">--Month--</option>
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>
        <div class="control-group">
            <label for="daySelect">Day</label>
            <select id="daySelect" disabled>
                <option value="">--Day--</option>
            </select>
        </div>
    </section>

    <section class="chart-container">
        <h2>Daily Temperatures (2000–2026)</h2>
        <canvas id="dailyRecentChart"></canvas>
    </section>

    <section class="chart-container">
        <h2>Daily Temperatures (1959–1999)</h2>
        <canvas id="dailyOlderChart"></canvas>
    </section>

    <section class="chart-container">
        <h2>Monthly Average Temperatures</h2>
        <canvas id="monthlyChart"></canvas>
    </section>

    <section class="chart-container">
        <h2>Yearly Average Temperatures (1959–2023)</h2>
        <canvas id="yearlyChart"></canvas>
    </section>

    <script src="script.js"></script>
    <footer>
        <p>Source: <a href="https://en.ilmatieteenlaitos.fi/" target="_blank">Finnish Meteorological Institute</a></p>
    </footer>
</body>
</html>
